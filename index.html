<!DOCTYPE html>
<html lang="ru">
<head>

<nav>

<h1>🔥 Clicker</h1>

<div class="card">
    <input id="username" placeholder="Имя">
    <button onclick="setName()">OK</button>
    <p id="playerName"></p>
</div>

<div class="card main">
    <h2 id="score">0</h2>
    <button id="clickBtn" onclick="clickCoin(event)">💰</button>
</div>

<div class="card">
    <button onclick="buyUpgrade()">+1 (<span id="upgradeCost">10</span>)</button>
</div>

<div class="card">
    <p id="eventText"></p>
</div>

<script src="script.js"></script>
</body>
