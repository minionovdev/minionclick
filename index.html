<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minion Click </title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
    <a href="index.html">🏠</a>
    <a href="tasks.html">🎯</a>
    <a href="leaderboard.html">🏆</a>
    <a href="profile.html">👤</a>
</nav>

<h1 class="logo">💰 MinionClick</h1>

<div class="profile card">
    <input id="username" placeholder="Введите имя">
    <button onclick="setName()">OK</button>
    <p id="playerName"></p>
</div>

<div class="game">
    <div id="coin" class="coin" onclick="clickCoin(event)">
        <div class="shine"></div>
    </div>

    <div class="score" id="score">0</div>
</div>

<div class="panel">
    <div class="card">
        <button onclick="buyUpgrade()" class="btn">
            ⚡ Сила клика (<span id="upgradeCost">10</span>)
        </button>
    </div>

    <div class="card">
        <p id="eventText">Загрузка...</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
