<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="index.html">🏠</a>
    <a href="tasks.html">🎯</a>
    <a href="leaderboard.html">🏆</a>
    <a href="profile.html">👤</a>
</nav>

<h1 class="title">💰 Clicker Pro</h1>

<div class="card">
    <input id="username" placeholder="Имя">
    <button onclick="setName()">OK</button>
    <p id="playerName"></p>
</div>

<div class="game">
    <div class="coin" id="coin" onclick="clickCoin(event)">💰</div>
    <h2 id="score">0</h2>
</div>

<div class="card">
    <button class="upgrade" onclick="buyUpgrade()">
        ⚡ +1 за клик (<span id="upgradeCost">10</span>)
    </button>
</div>

<div class="card">
    <p id="eventText"></p>
</div>

<script src="script.js"></script>
</body>
</html>
