<h1>👤 Профиль</h1>

<div class="card">

    </p>
</div>

<div class="card">
    <h3>🛒 Магазин</h3>

    <div class="shopItem" onclick="buySkin('blue',100)">
        🔵 Синий
        <span><img class="coinIconSmall" src="https://cdn-icons-png.flaticon.com/512/138/138292.png">100</span>
    </div>

    <div class="shopItem" onclick="buySkin('red',200)">
        🔴 Красный
        <span><img class="coinIconSmall" src="https://cdn-icons-png.flaticon.com/512/138/138292.png">200</span>
    </div>

    <div class="shopItem" onclick="buySkin('rainbow',500)">
        🌈 Радуга
        <span><img class="coinIconSmall" src="https://cdn-icons-png.flaticon.com/512/138/138292.png">500</span>
    </div>
</div>

<div class="card">
    <h3>🏆 Достижения</h3>
    <div id="achievements"></div>
